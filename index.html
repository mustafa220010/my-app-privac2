<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق اللياقة الذكي</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-color: #f4f7f6; --primary-color: #3182ce; --screen-bg: #ffffff;
            --text-color: #2d3748; --btn-text: #ffffff; --border-color: #cbd5e1;
            --advanced-bg: #f8fafc; --extra-bg: #e2e8f0; --section-title: #475569;
            --card-shadow: 0 8px 25px rgba(0,0,0,0.06);
        }

        body.dark-mode {
            --bg-color: #121820 !important; --screen-bg: #1e2632; --text-color: #e2e8f0;
            --border-color: #334155; --advanced-bg: #171d26; --extra-bg: #121820;
            --card-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; transition: background-color 0.3s, color 0.3s; }
        .app-header { background: var(--primary-color); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .app-header h3 { margin: 0; font-size: 18px; font-weight: bold; flex-grow: 1; text-align: center; }
        .profile-icon { font-size: 24px; cursor: pointer; background: rgba(255,255,255,0.2); padding: 5px 10px; border-radius: 50%; }
        .header-actions { display: flex; gap: 12px; direction: ltr; }
        .header-actions span { font-size: 22px; cursor: pointer; background: rgba(255,255,255,0.2); padding: 5px 8px; border-radius: 8px; }
        .app-container { padding: 20px; padding-bottom: 110px; } 
        .screen { background: var(--screen-bg); max-width: 450px; margin: 0 auto; padding: 25px; border-radius: 20px; box-shadow: var(--card-shadow); display: none; }
        .active { display: block; }
        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; color: var(--btn-text); font-weight: bold; }
        .btn-primary { background-color: var(--primary-color); }
        .btn-back { background-color: #94a3b8; }
        .image-placeholder { width: 100%; height: 220px; background-color: var(--extra-bg); border: 2px dashed var(--border-color); border-radius: 15px; display: flex; align-items: center; justify-content: center; margin-bottom: 15px; font-size: 45px; }
        .advanced-box { background: var(--advanced-bg); border: 1px solid var(--border-color); padding: 18px; border-radius: 15px; margin-top: 15px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid var(--border-color); border-radius: 10px; box-sizing: border-box; background-color: var(--screen-bg); color: var(--text-color); }
    </style>
</head>
<body>

    <div class="app-header">
        <div class="profile-icon" onclick="switchScreen('profileScreen')">👤</div>
        <h3 id="appTitle">تطبيق اللياقة الذكي</h3>
        <div class="header-actions">
            <span onclick="toggleHeaderLanguage()">🌐</span>
            <span onclick="switchScreen('settingsScreen')">⚙️</span>
        </div>
    </div>

    <div class="app-container">
        <div id="mainScreen" class="screen active">
            <button class="btn-primary" onclick="switchScreen('calcScreen')">📸 1. تصوير لحساب السعرات</button>
            <button class="btn-primary" onclick="switchScreen('historyScreen')">📋 2. سجل الوجبات</button>
            <button class="btn-primary" onclick="switchScreen('macrosScreen')" style="background-color: #38bdf8;">🧮 3. احسب احتياجك اليومي</button>
            <button class="btn-primary" onclick="switchScreen('infoScreen')">📖 4. طريقة الاستخدام</button>
        </div>

        <div id="calcScreen" class="screen">
            <div id="imageBox" class="image-placeholder">📸</div>
            <button class="btn-primary" onclick="switchScreen('mainScreen')">رجوع</button>
        </div>

        <div id="settingsScreen" class="screen">
            <button class="btn-back" onclick="switchScreen('mainScreen')">رجوع</button>
        </div>

        <div id="macrosScreen" class="screen">
            <button class="btn-back" onclick="switchScreen('mainScreen')">رجوع</button>
        </div>

        <div id="infoScreen" class="screen">
            <button class="btn-back" onclick="switchScreen('mainScreen')">رجوع</button>
        </div>
        
        <div id="historyScreen" class="screen">
            <button class="btn-back" onclick="switchScreen('mainScreen')">رجوع</button>
        </div>
        <div id="profileScreen" class="screen">
            <button class="btn-back" onclick="switchScreen('mainScreen')">رجوع</button>
        </div>
    </div>

    <script>
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }
