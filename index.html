<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق السعرات الذكي</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root { --primary-color: #3182ce; --bg-color: #f4f7f6; --screen-bg: #ffffff; --text-color: #2d3748; }
        body { font-family: sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; }
        .app-header { background: var(--primary-color); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .app-container { padding: 20px; max-width: 450px; margin: 0 auto; }
        .screen { background: var(--screen-bg); padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); display: none; }
        .active { display: block; }
        button { width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 10px; background: var(--primary-color); color: white; cursor: pointer; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="app-header">
        <span onclick="switchScreen('profileScreen')">👤</span>
        <h3>تطبيق السعرات</h3>
        <select id="langSelector" onchange="changeLanguage()" style="width: auto; margin: 0;">
            <option value="ar">العربية</option>
            <option value="en">English</option>
        </select>
    </div>

    <div class="app-container">
        <div id="mainScreen" class="screen active">
            <button onclick="switchScreen('calcScreen')">📸 حساب سعرات الوجبة</button>
            <button onclick="switchScreen('historyScreen')">📋 سجل الوجبات</button>
            <button onclick="switchScreen('macrosScreen')">🧮 حاسبة الاحتياج اليومي</button>
        </div>

        <div id="calcScreen" class="screen">
            <input type="file" accept="image/*">
            <button onclick="switchScreen('mainScreen')">رجوع</button>
        </div>

        <div id="historyScreen" class="screen">
            <h4>سجل الوجبات</h4>
            <div id="historyList"></div>
            <button onclick="switchScreen('mainScreen')">رجوع</button>
        </div>

        <div id="macrosScreen" class="screen">
            <h4>حاسبة الاحتياج</h4>
            <input type="number" id="weight" placeholder="الوزن (كجم)">
            <button onclick="calculateMacros()">احسب</button>
            <h4 id="result"></h4>
            <button onclick="switchScreen('mainScreen')">رجوع</button>
        </div>

        <div id="profileScreen" class="screen">
            <div id="g_id_onload" data-client_id="YOUR_ID" data-callback="handleGoogleLogin"></div>
            <div class="g_id_signin"></div>
            <button onclick="switchScreen('mainScreen')">رجوع</button>
        </div>
    </div>

    <script>
        function switchScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function changeLanguage() {
            const lang = document.getElementById('langSelector').value;
            document.documentElement.lang = lang;
            document.documentElement.dir = (lang === 'ar') ? 'rtl' : 'ltr';
            // هنا يمكنك إضافة منطق ترجمة النصوص
        }

        function calculateMacros() {
            const weight = document.getElementById('weight').value;
            document.getElementById('result').innerText = "احتياجك التقديري: " + (weight * 30) + " سعرة";
        }

        function handleGoogleLogin(res) { console.log("تم تسجيل الدخول"); }
    </script>
</body>
</html>
