<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق اللياقة الذكي</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --bg-color: #f4f7f6; --primary-color: #3182ce; --screen-bg: #ffffff;
            --text-color: #2d3748; --btn-text: #ffffff; --border-color: #cbd5e1;
            --advanced-bg: #f8fafc; --extra-bg: #e2e8f0; --section-title: #475569;
            --card-shadow: 0 8px 25px rgba(0,0,0,0.06); --success-color: #10b981;
            --calories-color: #ef4444;
        }

        body.dark-mode {
            --bg-color: #121820 !important; --screen-bg: #1e2632; --text-color: #e2e8f0;
            --border-color: #334155; --advanced-bg: #171d26; --extra-bg: #0f172a;
            --section-title: #cbd5e1; --card-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 0; transition: 0.3s; }
        
        .app-header { background: var(--primary-color); padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; color: white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .app-header h3 { margin: 0; font-size: 18px; font-weight: bold; flex-grow: 1; text-align: center; }
        .header-actions { display: flex; gap: 12px; direction: ltr; }
        .header-actions span { font-size: 22px; cursor: pointer; background: rgba(255,255,255,0.2); padding: 5px 8px; border-radius: 8px; }

        .app-container { padding: 20px; padding-bottom: 110px; } 
        .screen { background: var(--screen-bg); max-width: 450px; margin: 0 auto; padding: 25px; border-radius: 20px; box-shadow: var(--card-shadow); display: none; position: relative; }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        button { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 12px; font-size: 16px; cursor: pointer; color: var(--btn-text); font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.98); }
        .btn-primary { background-color: var(--primary-color); }
        .btn-back { background-color: #94a3b8; }
        .btn-workout { background-color: #f59e0b; box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3); } 
        .btn-success { background-color: var(--success-color); box-shadow: 0 4px 15px rgba(16, 185, 129, 0.3); font-size: 18px;}

        .advanced-box { background: var(--advanced-bg); border: 1px solid var(--border-color); padding: 18px; border-radius: 15px; margin-top: 15px; }
        .section-title { font-weight: bold; margin-top: 15px; margin-bottom: 5px; color: var(--section-title); border-bottom: 1px solid var(--border-color); padding-bottom: 8px; }
        select, input { width: 100%; padding: 12px; margin: 8px 0 15px 0; border: 1px solid var(--border-color); border-radius: 10px; background-color: var(--screen-bg); color: var(--text-color); font-size: 15px; }
        
        .workout-list-item { display: flex; align-items: center; background: var(--screen-bg); border-radius: 12px; margin-bottom: 12px; padding: 12px; border: 1px solid var(--border-color); }
        .workout-img-box { width: 70px; height: 70px; background: var(--extra-bg); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 35px; margin-left: 15px; flex-shrink: 0; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1); }
        .workout-info { flex-grow: 1; text-align: right; }
        .workout-title { font-weight: bold; font-size: 15px; margin-bottom: 5px; }
        .workout-meta { font-size: 14px; color: var(--primary-color); font-weight: bold; }
        .calories-badge { display: inline-block; background: #fee2e2; color: var(--calories-color); padding: 5px 15px; border-radius: 20px; font-weight: bold; font-size: 14px; margin-bottom: 15px; text-align: center; width: 100%; box-sizing: border-box;}
        body.dark-mode .calories-badge { background: #7f1d1d; color: #fca5a5; }

        /* الشاشة التفاعلية */
        .progress-bar-container { width: 100%; height: 8px; background: var(--extra-bg); border-radius: 4px; margin-bottom: 25px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--success-color); width: 0%; transition: width 0.4s ease; }
        
        /* تأثير 3D لصورة التمرين */
        .active-image-box { width: 100%; height: 220px; background: linear-gradient(145deg, var(--extra-bg), var(--screen-bg)); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 100px; margin-bottom: 20px; box-shadow:  10px 10px 20px rgba(0,0,0,0.1), -10px -10px 20px rgba(255,255,255,0.5); cursor: pointer; transition: transform 0.3s; position: relative; }
        body.dark-mode .active-image-box { box-shadow:  10px 10px 20px rgba(0,0,0,0.3), -10px -10px 20px rgba(255,255,255,0.02); }
        .active-image-box:active { transform: scale(0.95); }
        .active-image-box::after { content: "👆 اضغط للتفاصيل"; position: absolute; bottom: 10px; font-size: 12px; background: rgba(0,0,0,0.5); color: white; padding: 4px 10px; border-radius: 10px; }

        .active-title { font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 10px; }
        .active-value { font-size: 45px; font-weight: bold; color: var(--primary-color); text-align: center; margin-bottom: 30px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }

        /* نافذة تفاصيل العضلات */
        #detailsModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: var(--screen-bg); width: 85%; max-width: 400px; padding: 25px; border-radius: 20px; text-align: right; box-shadow: 0 15px 35px rgba(0,0,0,0.2); }
        .muscle-row { margin-bottom: 10px; }
        .muscle-name { font-size: 14px; font-weight: bold; display: flex; justify-content: space-between; margin-bottom: 5px; }
        .muscle-bar-bg { width: 100%; height: 8px; background: var(--extra-bg); border-radius: 4px; overflow: hidden; }
        .muscle-bar-fill { height: 100%; background: #ef4444; border-radius: 4px; }
        .modal-close { background: var(--primary-color); margin-top: 20px; }

    </style>
</head>
<body>

    <!-- أصوات النظام -->
    <!-- يمكنك استبدال الروابط بملفات صوتية حقيقية MP3 -->
    <audio id="soundDone" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg" preload="auto"></audio>
    <audio id="soundCheer" src="https://actions.google.com/sounds/v1/crowds/crowd_cheer.ogg" preload="auto"></audio>

    <div class="app-header">
        <h3>تطبيق اللياقة الذكي</h3>
        <div class="header-actions">
            <span onclick="switchScreen('settingsScreen')" title="الإعدادات">⚙️</span>
        </div>
    </div>

    <div class="app-container">
        <!-- الشاشة الرئيسية -->
        <div id="mainScreen" class="screen active">
            <button class="btn-workout" onclick="switchScreen('workoutsScreen')">🏋️‍♂️ 1. التمارين الرياضية (AI)</button>
            <button class="btn-primary" onclick="switchScreen('settingsScreen')">🔔 2. إعدادات الإشعارات والصوت</button>
        </div>

        <!-- شاشة التمارين الرياضية -->
        <div id="workoutsScreen" class="screen">
            <h2 style="text-align: center;">التمارين الرياضية 🏋️‍♂️</h2>
            <div class="advanced-box">
                <label class="section-title" style="border:none; margin:0;">التركيز على:</label>
                <select id="wo-muscle" onchange="resetWorkoutResult()">
                    <option value="fullbody">جسم كامل (حرق عالي)</option>
                    <option value="chest">عضلة الصدر</option>
                    <option value="lower">الجزء السفلي (الأرجل)</option>
                </select>
                <button class="btn-workout" onclick="generateWorkoutList()">تنظيم الجدول (AI)</button>
            </div>

            <div id="workout-result-container" style="display: none; margin-top: 15px;">
                <div id="totalCaloriesBadge" class="calories-badge">🔥 الحرق المتوقع: 0 سعرة حرارية</div>
                <div id="workout-list-html"></div>
                <button class="btn-success" onclick="startInteractiveWorkout()">🚀 ابدأ التدريب الآن</button>
            </div>
            <button class="btn-back" onclick="switchScreen('mainScreen')">رجوع للرئيسية</button>
        </div>

        <!-- شاشة التدريب التفاعلي -->
        <div id="activeWorkoutScreen" class="screen">
            <div class="progress-bar-container">
                <div id="workoutProgress" class="progress-bar"></div>
            </div>
            
            <div class="active-image-box" id="activeExImg" onclick="showExerciseDetails()">🏃‍♂️</div>
            
            <div class="active-title" id="activeExTitle">اسم التمرين</div>
            <div class="active-value" id="activeExValue">x 15</div>
            
            <button class="btn-success" onclick="completeCurrentExercise()">✔️ إتمام والانتقال للتالي</button>
            <button class="btn-back" onclick="quitWorkout()">❌ إنهاء مبكر</button>
        </div>

        <!-- شاشة الإعدادات والإشعارات -->
        <div id="settingsScreen" class="screen">
            <h2 style="text-align: center;">الإعدادات والمظهر</h2>
            <div class="advanced-box">
                <label class="section-title" style="border:none; margin:0;">نمط العرض:</label>
                <select id="themeSelector" onchange="changeTheme()">
                    <option value="light">الوضع الفاتح ☀️</option>
                    <option value="dark">الوضع الداكن 🌙</option>
                </select>
            </div>
            <div class="advanced-box">
                <label class="section-title" style="border:none; margin:0;">الإشعارات والتذكير 🔔:</label>
                <button class="btn-primary" onclick="enableNotifications()">تفعيل تذكير شرب الماء والتمارين</button>
                <p id="notifStatus" style="font-size: 12px; color: var(--success-color); text-align: center; display: none;">✅ الإشعارات مفعلة بنجاح!</p>
            </div>
            <button class="btn-back" onclick="switchScreen('mainScreen')">رجوع</button>
        </div>
    </div>

    <!-- نافذة تفاصيل التمرين (Modal) -->
    <div id="detailsModal">
        <div class="modal-content">
            <h3 id="modalTitle" style="color: var(--primary-color); margin-top: 0;">اسم التمرين</h3>
            <p id="modalDesc" style="font-size: 14px; color: var(--section-title);">وصف الفوائد هنا...</p>
            <h4 style="margin-bottom: 10px;">🎯 العضلات المستهدفة:</h4>
            <div id="modalMuscles">
                <!-- أشرطة العضلات ستتم إضافتها هنا برمجياً -->
            </div>
            <button class="modal-close" onclick="closeExerciseDetails()">حسناً، فهمت</button>
        </div>
    </div>

    <script>
        // --- 1. قاعدة بيانات التمارين الشاملة (تشمل السعرات والعضلات) ---
        const dbWorkouts = {
            fullbody: [
                { n: "قفز مع فتح القدمين (Jumping Jacks)", d: "تمرين ممتاز لتسخين الجسم، يرفع معدل نبضات القلب وينشط الدورة الدموية.", type: "time", base: 60, calPerUnit: 0.2, img: "🏃‍♂️", muscles: {"القلب (كارديو)": 50, "السمانة": 30, "الأكتاف": 20} },
                { n: "سكوات بوزن الجسم", d: "يقوي الجزء السفلي بالكامل ويحسن توازن الجسم ومرونة المفاصل.", type: "reps", base: 25, calPerUnit: 1.5, img: "🦵", muscles: {"الفخذ الأمامي": 50, "عضلات المؤخرة": 30, "الفخذ الخلفي": 20} },
                { n: "بيربي كامل (Burpees)", d: "تمرين شامل وحارق جبار للدهون، يدمج بين القوة والكارديو.", type: "reps", base: 15, calPerUnit: 2.5, img: "🔥", muscles: {"القلب (كارديو)": 40, "الصدر": 30, "الأرجل": 30} },
                { n: "تسلق الجبال (Mountain Climbers)", d: "يستهدف عضلات البطن الأساسية ويحرق دهون الخصر بفعالية.", type: "time", base: 60, calPerUnit: 0.25, img: "🧗‍♂️", muscles: {"البطن (Core)": 50, "الأكتاف": 30, "القلب (كارديو)": 20} }
            ],
            chest: [
                { n: "تمرين الضغط (Push-ups)", d: "التمرين الأساسي لبناء عضلة الصدر وتقوية الذراعين بدون أوزان.", type: "reps", base: 20, calPerUnit: 1.2, img: "💪", muscles: {"الصدر": 60, "الترايسبس": 25, "الكتف الأمامي": 15} },
                { n: "بلانك (Plank)", d: "تمرين ثبات جبار لتقوية الجذع وحماية العمود الفقري.", type: "time", base: 60, calPerUnit: 0.1, img: "🧘‍♂️", muscles: {"البطن (Core)": 70, "الأكتاف": 20, "أسفل الظهر": 10} }
            ],
            lower: [
                { n: "الطعنات (Lunges)", d: "يعزل عضلات الأرجل ويركز على تناسق العضلات وشد الترهلات.", type: "reps", base: 20, calPerUnit: 1.5, img: "🚶‍♂️", muscles: {"الفخذ الأمامي": 40, "المؤخرة": 40, "السمانة": 20} }
            ]
        };

        let currentWorkoutPlan = [];
        let currentExerciseIndex = 0;
        let halfwayAnnounced = false; // لمنع تكرار نطق المنتصف

        // --- التبديل بين الشاشات ---
        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // --- الثيم (مظلم/فاتح) ---
        function changeTheme() { 
            const theme = document.getElementById('themeSelector').value;
            if (theme === 'dark') document.body.classList.add('dark-mode');
            else document.body.classList.remove('dark-mode');
        }

        // --- المساعد الصوتي (Text to Speech) ---
        function speakText(text) {
            if ('speechSynthesis' in window) {
                // إيقاف أي نطق سابق
                window.speechSynthesis.cancel();
                const msg = new SpeechSynthesisUtterance(text);
                msg.lang = 'ar-SA'; // نطق عربي
                msg.rate = 0.9; // سرعة النطق
                window.speechSynthesis.speak(msg);
            }
        }

        // --- نظام الإشعارات (Notifications) ---
        function enableNotifications() {
            if (!("Notification" in window)) {
                alert("متصفحك لا يدعم الإشعارات.");
                return;
            }
            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    document.getElementById('notifStatus').style.display = 'block';
                    new Notification("تطبيق اللياقة الذكي 🏋️‍♂️", { body: "تم تفعيل التذكيرات! سنقوم بتذكيرك بشرب الماء كل ساعتين." });
                    
                    // مثال لتذكير شرب الماء (يتم تشغيله كل ساعتين نظرياً - وضعنا دقيقة للتجربة إذا أردت)
                    setInterval(() => {
                        new Notification("💧 وقت شرب الماء!", { body: "حافظ على رطوبة جسمك، اشرب كوباً من الماء الآن." });
                    }, 1000 * 60 * 120); // 120 دقيقة
                } else {
                    alert("يرجى السماح للإشعارات من إعدادات المتصفح ليعمل التذكير.");
                }
            });
        }

        // --- تكوين الجدول بحرق > 250 سعرة ---
        function generateWorkoutList() {
            const muscle = document.getElementById('wo-muscle').value;
            let baseExercises = dbWorkouts[muscle] || dbWorkouts['fullbody'];
            
            currentWorkoutPlan = [];
            let totalCalories = 0;
            let rounds = 0;

            // نكرر التمارين كجولات (Circuits) حتى نتجاوز 250 سعرة حرارية
            while (totalCalories < 260 && rounds < 10) { // حد أقصى 10 جولات للحماية
                baseExercises.forEach(ex => {
                    let exCal = ex.base * ex.calPerUnit;
                    totalCalories += exCal;
                    
                    currentWorkoutPlan.push({
                        name: ex.n, desc: ex.d, type: ex.type,
                        value: ex.base, img: ex.img, muscles: ex.muscles
                    });
                });
                rounds++;
            }

            const listContainer = document.getElementById('workout-list-html');
            listContainer.innerHTML = '';

            document.getElementById('totalCaloriesBadge').innerText = `🔥 الحرق المتوقع: ${Math.floor(totalCalories)} سعرة حرارية (${rounds} جولات)`;

            currentWorkoutPlan.forEach(ex => {
                let displayValue = ex.type === 'reps' ? `x ${ex.value} عدة` : `⏱️ ${ex.value} ثانية`;
                listContainer.innerHTML += `
                    <div class="workout-list-item">
                        <div class="workout-img-box">${ex.img}</div>
                        <div class="workout-info">
                            <div class="workout-title">${ex.name}</div>
                            <div class="workout-meta">${displayValue}</div>
                        </div>
                    </div>
                `;
            });

            document.getElementById('workout-result-container').style.display = 'block';
        }

        function resetWorkoutResult() { document.getElementById('workout-result-container').style.display = 'none'; }

        // --- بدء التمارين ---
        function startInteractiveWorkout() {
            if(currentWorkoutPlan.length === 0) return;
            currentExerciseIndex = 0;
            halfwayAnnounced = false;
            switchScreen('activeWorkoutScreen');
            renderCurrentExercise();
        }

        function renderCurrentExercise() {
            const ex = currentWorkoutPlan[currentExerciseIndex];
            
            // تحديث الشريط
            const progressPercent = (currentExerciseIndex / currentWorkoutPlan.length) * 100;
            document.getElementById('workoutProgress').style.width = `${progressPercent}%`;

            // تحديث الشاشة
            document.getElementById('activeExImg').innerText = ex.img;
            document.getElementById('activeExTitle').innerText = ex.name;
            
            let valueText = ex.type === 'reps' ? `${ex.value} عدة` : `${ex.value} ثانية`;
            document.getElementById('activeExValue').innerText = valueText;

            // نطق اسم التمرين والعدد
            speakText(`التمرين التالي: ${ex.name}، ${valueText}.`);

            // فحص الوصول للمنتصف
            if (!halfwayAnnounced && currentExerciseIndex === Math.floor(currentWorkoutPlan.length / 2) && currentExerciseIndex > 0) {
                setTimeout(() => { speakText("أحسنت! لقد وصلت لمنتصف التدريب، استمر يا بطل"); }, 3000);
                halfwayAnnounced = true;
            }
        }

        // --- إنهاء التمرين الحالي ---
        function completeCurrentExercise() {
            // تشغيل صوت تشجيعي صغير
            document.getElementById('soundDone').play().catch(e => {});

            currentExerciseIndex++;
            if (currentExerciseIndex >= currentWorkoutPlan.length) {
                // اكتمل التدريب
                document.getElementById('workoutProgress').style.width = '100%';
                document.getElementById('soundCheer').play().catch(e => {});
                speakText("مبروك! لقد أنهيت التدريب بنجاح، وحرقت أكثر من مئتين وخمسين سعرة حرارية، أنت بطل حقيقي.");
                
                setTimeout(() => {
                    alert("🎉 تم إنجاز التدريب بنجاح! بطل!");
                    switchScreen('workoutsScreen');
                }, 1000);
            } else {
                renderCurrentExercise();
            }
        }

        function quitWorkout() {
            if(confirm("هل أنت متأكد أنك تريد إنهاء التدريب مبكراً؟")) {
                window.speechSynthesis.cancel();
                switchScreen('workoutsScreen');
            }
        }

        // --- تفاصيل التمرين (Modal - 3D Click) ---
        function showExerciseDetails() {
            const ex = currentWorkoutPlan[currentExerciseIndex];
            document.getElementById('modalTitle').innerText = ex.name;
            document.getElementById('modalDesc').innerText = ex.desc;
            
            const musclesContainer = document.getElementById('modalMuscles');
            musclesContainer.innerHTML = '';
            
            // رسم أشرطة العضلات بنسب مئوية
            for (const [muscleName, percentage] of Object.entries(ex.muscles)) {
                musclesContainer.innerHTML += `
                    <div class="muscle-row">
                        <div class="muscle-name"><span>${muscleName}</span> <span>${percentage}%</span></div>
                        <div class="muscle-bar-bg"><div class="muscle-bar-fill" style="width: ${percentage}%;"></div></div>
                    </div>
                `;
            }
            
            document.getElementById('detailsModal').style.display = 'flex';
        }

        function closeExerciseDetails() {
            document.getElementById('detailsModal').style.display = 'none';
        }

    </script>
</body>
</html>
